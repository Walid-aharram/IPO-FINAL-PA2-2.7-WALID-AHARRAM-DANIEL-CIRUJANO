    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* ESCENA VIRTUAL (Fondo Salón Realista) */
        #escena-ar {
            position: absolute;
            top: -5vh;
            left: -10vw;
            width: 120vw;
            height: 110vh;
            background-image: url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease-out;
            z-index: 10;
        }

        /* FOCO INMERSIVO (Simulación de vista a través de lentes) */
        #overlay-foco {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: 50;
            /* Se ha aumentado el radio de 450px a 650px para hacer el foco más grande */
            background: radial-gradient(circle 650px at var(--x, 50%) var(--y, 50%), transparent 15%, rgba(0, 0, 0, 0.92) 85%);
            transition: background 0.1s ease-out;
        }

        /* MONITOR VIRTUAL FLOTANTE */
        #monitor-virtual {
            width: 70vw; 
            height: 80vh;
            background: rgba(15, 23, 42, 0.65); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: flotar 8s ease-in-out infinite alternate;
            z-index: 20;
        }

        @keyframes flotar {
            0% { transform: translateY(0px) rotateX(0deg); }
            100% { transform: translateY(-10px) rotateX(1deg); }
        }

        .browser-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .browser-url {
            flex-grow: 1;
            background: rgba(255,255,255,0.15);
            padding: 6px 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #60a5fa;
            text-align: center;
            letter-spacing: 0.5px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .portal-content {
            flex-grow: 1;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            overflow-y: auto;
            scrollbar-width: none;
            justify-content: center;
        }

        .portal-content::-webkit-scrollbar {
            display: none;
        }

        /* TARJETAS DE NOTIFICACIÓN */
        .tarjeta-noticia {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            border-radius: 1rem;
            min-height: 90px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 2px solid transparent;
            display: flex;
            overflow: hidden;
            cursor: pointer;
        }

        .noticia-activa {
            transform: scale(1.025);
            z-index: 20;
        }

        /* COLORES SEMÁNTICOS */
        .aura-verde { border-color: #22c55e !important; box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .aura-roja { border-color: #ef4444 !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .aura-naranja { border-color: #f97316 !important; box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }

        .resultado-analisis {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 40%; 
            padding: 1rem;
            display: flex;
            align-items: center;
            transform: translateX(101%); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .resultado-analisis.mostrar { transform: translateX(0); }

        .linea-escaner {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: #3b82f6; box-shadow: 0 0 10px #3b82f6;
            animation: escanear 1.5s linear infinite; display: none; z-index: 30;
        }

        @keyframes escanear { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        /* HUD - INTERFAZ DE GAFAS */
        .ar-hud-top {
            position: fixed; top: 20px; right: 25px;
            color: rgba(255,255,255,0.9); font-size: 0.8rem;
            z-index: 100; text-align: right;
        }

        .ar-hud-bottom {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* MODAL DE HISTORIAL */
        .holograma-panel {
            background: rgba(8, 20, 45, 0.95);
            border: 2px solid rgba(56, 189, 248, 0.6);
            box-shadow: 0 0 60px rgba(56, 189, 248, 0.15);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 80;
            color: #e2e8f0;
        }

        #modal-historial {
            position: fixed;
            inset: 0;
            z-index: 150;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
        }

        #modal-historial.activo { display: flex; }

        .log-entry {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #3b82f6;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .entry-status {
            font-weight: 900;
            font-size: 0.65rem;
            margin-bottom: 2px;
            display: block;
        }

        /* INDICADOR PATILLA */
        .patilla-right-hint {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(59, 130, 246, 0.2);
            padding: 15px 8px;
            border-radius: 20px 0 0 20px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-right: none;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 10px;
            font-weight: bold;
            color: #60a5fa;
            letter-spacing: 2px;
            z-index: 100;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }

        /* INDICADOR PATILLA IZQUIERDA (BORRAR HISTORIAL) */
        .patilla-left-hint {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) rotate(180deg);
            background: rgba(239, 68, 68, 0.15);
            padding: 15px 8px;

            letter-spacing: 2px;
            z-index: 160;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .patilla-left-hint:hover {
            background: rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

            const fin = inicio + itemsPorPagina;
            const noticiasMostradas = notificacionesData.slice(inicio, fin);

            noticiasMostradas.forEach(item => {
                contenedor.innerHTML += `
                    <div class="tarjeta-noticia" id="noticia-${item.id}" onmouseenter="activarNoticia('${item.id}', '${item.type}')" onmouseleave="desactivarNoticia('${item.id}')">
                        <div class="linea-escaner" id="escaner-${item.id}"></div>
                        <div class="flex items-center justify-center w-20 ${item.iconBg} text-2xl">${item.icon}</div>
                        <div class="flex-grow p-4">
                            <span class="text-[9px] font-bold ${item.sourceColor} uppercase tracking-widest">${item.source}</span>
                            <h2 class="text-sm font-bold text-slate-800 leading-tight mt-0.5">${item.title}</h2>
                        </div>
                        <div id="resultado-${item.id}" class="resultado-analisis ${item.resultBg} border-l-4 ${item.resultBorder}">
                            <i class="fa-solid ${item.resultIcon} text-2xl mr-3"></i>
                            <div>
                                <h3 class="text-[10px] font-black ${item.resultColor}">${item.resultTitle}</h3>
                                <p class="text-[9px] text-slate-600">${item.resultText}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // CAMBIAR PÁGINA DE NOTICIAS
        function cambiarNoticias() {
            paginaActual++;
            if (paginaActual * itemsPorPagina >= notificacionesData.length) {
                paginaActual = 0; // Vuelve al principio si se acaban
            }
            renderNoticias();
            document.getElementById('contenedor-noticias').scrollTop = 0;
        }

        // FUNCIONES DE INTERACCIÓN (FOCO)
        function moverTodo(e) {
            const x = e.clientX;
            const y = e.clientY;
            overlayFoco.style.setProperty('--x', `${x}px`);
            overlayFoco.style.setProperty('--y', `${y}px`);

            const moveX = (x / window.innerWidth - 0.5) * 15;
            const moveY = (y / window.innerHeight - 0.5) * 15;
            escena.style.transform = `translate(${moveX * -1}px, ${moveY * -1}px)`;
            monitor.style.transform = `rotateY(${moveX * 0.15}deg) rotateX(${moveY * -0.15}deg)`;
        }

        function activarNoticia(id, tipo) {
            const card = document.getElementById(`noticia-${id}`);
            const scanner = document.getElementById(`escaner-${id}`);
            const result = document.getElementById(`resultado-${id}`);

            card.classList.add('noticia-activa');
            scanner.style.display = 'block';
            hudStatus.innerHTML = '<i class="fa-solid fa-sync fa-spin"></i> ESCANEANDO...';

            analizadorTimeout[id] = setTimeout(() => {
                scanner.style.display = 'none';
                result.classList.add('mostrar');
                
                if(tipo === 'falso') card.classList.add('aura-roja');
                else if(tipo === 'phishing') card.classList.add('aura-naranja');
                else card.classList.add('aura-verde');
                
                hudStatus.innerText = "ANÁLISIS COMPLETADO";

                // ACTUALIZAR HISTORIAL AL ESCANEAR LA NOTICIA
                if(!scannedIds.has(id)) {
                    scannedIds.add(id);
                    const noticiaInfo = notificacionesData.find(n => String(n.id) === String(id));
                    
                    if(tipo === 'falso') {
                        stats.amenazas++;
                        logsActivity.unshift({ tipo: 'rojo', status: '⚠ BLOQUEADA', text: `${noticiaInfo.source}: Patrón de desinformación detectado.` });
                    } else if(tipo === 'phishing') {
                        stats.alertas++;
                        logsActivity.unshift({ tipo: 'naranja', status: '⚡ AMENAZA', text: `${noticiaInfo.source}: Intento de fraude o phishing bloqueado.` });
                    } else {
                        stats.verificadas++;
                        logsActivity.unshift({ tipo: 'verde', status: '✓ VERIFICADA', text: `${noticiaInfo.source}: Fuente segura y confirmada.` });
                    }
                    actualizarHistorialDOM();
                }
            }, 800);
        }

        // DIBUJAR LOS CAMBIOS DEL HISTORIAL EN PANTALLA
        function actualizarHistorialDOM() {
            document.getElementById('stat-verificadas').innerText = stats.verificadas;
            document.getElementById('stat-amenazas').innerText = stats.amenazas;
            document.getElementById('stat-alertas').innerText = stats.alertas;

            const container = document.getElementById('log-container');
            if(logsActivity.length === 0) {
                container.innerHTML = '<div class="text-slate-400 text-xs italic px-2 py-4">Aún no se ha analizado ninguna notificación en esta sesión...</div>';
                return;
            }

            container.innerHTML = logsActivity.map(log => {
                let borderClass = log.tipo === 'verde' ? 'border-l-green-500' : (log.tipo === 'rojo' ? 'border-l-red-500' : 'border-l-orange-500');
                let statusClass = log.tipo === 'verde' ? 'text-green-400' : (log.tipo === 'rojo' ? 'text-red-400' : 'text-orange-400');
                return `
                    <div class="log-entry ${borderClass}">
                        <span class="entry-status ${statusClass}">${log.status}</span>
                        <span class="text-slate-300">${log.text}</span>
                    </div>
                `;
            }).join('');
        }

        function desactivarNoticia(id) {
            const card = document.getElementById(`noticia-${id}`);
            const result = document.getElementById(`resultado-${id}`);
            clearTimeout(analizadorTimeout[id]);
            card.classList.remove('noticia-activa', 'aura-verde', 'aura-roja', 'aura-naranja');
            result.classList.remove('mostrar');
            document.getElementById(`escaner-${id}`).style.display = 'none';
            hudStatus.innerText = "SISTEMA AR ACTIVO";
        }

        // FUNCIÓN PARA LIMPIAR EL HISTORIAL Y REINICIAR CONTADORES
        function limpiarHistorial() {
            stats = { verificadas: 0, amenazas: 0, alertas: 0 };
            logsActivity = [];
            scannedIds.clear(); // Permite volver a registrar noticias si se vuelven a escanear
            
            // Animación visual de borrado
            const container = document.getElementById('log-container');
            container.innerHTML = '<div class="text-green-400 text-xs font-bold px-2 py-4 flex items-center gap-2"><i class="fa-solid fa-check"></i> Memoria de sesión borrada con éxito.</div>';
            
            // Reiniciar contadores visualmente al instante
            document.getElementById('stat-verificadas').innerText = '0';
            document.getElementById('stat-amenazas').innerText = '0';
            document.getElementById('stat-alertas').innerText = '0';

            // Restaurar el mensaje de "Aún no se ha analizado" tras 1.5s
            setTimeout(() => {
                actualizarHistorialDOM();
            }, 1500);
        }

        function toggleHistorial() {
            modal.classList.toggle('activo');
        }

        // INICIALIZACIÓN
        window.onload = () => {
            overlayFoco.style.setProperty('--x', '50%');
            overlayFoco.style.setProperty('--y', '50%');
            renderNoticias(); // Carga la primera página al iniciar
            actualizarHistorialDOM(); // Inicializa el historial a cero
        };
    </script>
</body>
</html>
